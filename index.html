<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTyre | Catálogo Digital & Asesor IA</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        :root { --brand-red: #dc2626; --brand-black: #09090b; }
        body {
            background: var(--brand-black); color: #fafafa;
            background-image: url('https://www.transparenttextures.com/patterns/asphalt.png');
            background-attachment: fixed; font-family: 'Inter', sans-serif; overflow-x: hidden;
        }
        .glass { background: rgba(15, 15, 18, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(220, 38, 38, 0.2); }
        .hero-bg { background: linear-gradient(180deg, rgba(220,38,38,0.25) 0%, rgba(9,9,11,1) 100%); }

        /* ANIMACIÓN DE CARGA ALREDEDOR DEL LOGO (HEARTBEAT) */
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--brand-black); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: forceHide 3s forwards; }
        @keyframes forceHide { 0%, 80% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        .logo-pulse { width: 100px; height: 100px; border-radius: 50%; background: white; padding: 5px; animation: heartbeat 1.5s infinite ease-in-out; }
        @keyframes heartbeat { 0% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 50% { transform: scale(1); box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } 100% { transform: scale(0.9); box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }

        .product-card { transition: all 0.4s ease; border-top: 3px solid transparent; }
        .product-card:hover { transform: translateY(-8px); border-top-color: var(--brand-red); box-shadow: 0 15px 30px rgba(220, 38, 38, 0.1); }
        .form-input { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; color: white; transition: 0.3s; }
        .form-input:focus { border-color: var(--brand-red); outline: none; }
    </style>
</head>
<body class="antialiased">

    <div id="pwa-install-banner" class="fixed top-0 left-0 w-full z-[100] transition-transform duration-500 -translate-y-full">
        <div class="bg-zinc-900 border-b border-red-600/50 p-3 shadow-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" class="w-10 h-10 rounded-lg object-contain bg-white p-1">
                <div>
                    <h4 class="text-white font-black text-[10px] uppercase tracking-tighter">GlobalTyre App</h4>
                    <p class="text-zinc-500 text-[8px] uppercase font-bold">Instalación Directa</p>
                </div>
            </div>
            <button onclick="instalarAppDirecto()" class="bg-red-600 text-white text-[9px] font-black px-6 py-2 rounded-full uppercase tracking-widest active:scale-95 transition-all">Descargar App</button>
        </div>
    </div>

    <div id="loader"><img src="logo.jpg" class="logo-pulse shadow-xl" alt="GlobalTyre"></div>

    <nav class="fixed w-full z-40 glass border-b border-white/5 top-0">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <img src="logo.jpg" class="h-10 w-auto bg-white rounded p-1">
            <div class="flex items-center gap-4">
                <span class="hidden md:block text-[10px] font-black uppercase tracking-widest text-zinc-500">Santa Cruz, Bolivia</span>
                <a href="https://wa.me/59176395001" class="bg-zinc-900 border border-white/10 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase tracking-widest hover:bg-red-600 transition-all">Soporte</a>
            </div>
        </div>
    </nav>

    <section class="relative pt-32 pb-16 flex flex-col items-center justify-center hero-bg text-center">
        <div class="z-10 px-6 max-w-4xl" data-aos="fade-up">
            <h1 class="text-5xl md:text-8xl font-black uppercase mb-4 leading-none text-white tracking-tight">SOLUCIONES <br><span class="text-red-600 italic">QUE RUEDAN</span></h1>
            <p class="text-zinc-400 font-bold text-[10px] uppercase tracking-[0.6em]">Catálogo Oficial 2026</p>
        </div>
    </section>

    <div class="max-w-5xl mx-auto px-6 relative z-30 -mt-10 mb-20">
        <div class="glass p-6 rounded-[2.5rem] shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="filtroMedida" onkeyup="ejecutarFiltros()" placeholder="Medida o Modelo..." class="form-input p-4 w-full text-xs">
                <select id="filtroPosicion" onchange="ejecutarFiltros()" class="form-input p-4 w-full text-xs">
                    <option value="TODAS">Eje (Todos)</option>
                    <option value="DIRECCIÓN">Dirección</option>
                    <option value="TRACCIÓN">Tracción</option>
                    <option value="REMOLQUE">Remolque</option>
                </select>
                <select id="filtroAplicacion" onchange="ejecutarFiltros()" class="form-input p-4 w-full text-xs">
                    <option value="TODAS">Aplicación (Todas)</option>
                    <option value="REGIONAL">Regional</option>
                    <option value="MIXTO">Mixto</option>
                </select>
            </div>
        </div>
    </div>

    <main id="grid-camion" class="max-w-6xl mx-auto px-6 pb-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></main>

    <div id="ai-chat-window" class="fixed bottom-24 right-6 w-80 sm:w-96 glass rounded-3xl shadow-2xl z-50 flex flex-col overflow-hidden opacity-0 pointer-events-none transition-all translate-y-4">
        <div class="bg-red-700 p-4 text-white font-black uppercase text-[10px] tracking-widest flex justify-between items-center">
            Asesor GlobalTyre
            <button onclick="toggleChat()" class="text-white">✕</button>
        </div>
        <div id="chat-messages" class="h-80 bg-zinc-950/90 p-4 overflow-y-auto text-xs flex flex-col gap-3">
            <div class="bg-zinc-800 text-white p-3 rounded-xl rounded-tl-none self-start max-w-[85%] border border-white/5">¡Hola! Soy tu <b>Asesor GlobalTyre</b>. ¿Qué medida buscas hoy?</div>
        </div>
        <div class="p-3 bg-zinc-900 flex items-center gap-2 border-t border-white/5">
            <input type="text" id="chatInput" placeholder="Preguntar..." class="bg-black border border-zinc-700 text-white text-xs rounded-full px-4 py-2 w-full outline-none focus:border-red-600">
            <button onclick="enviarMensajeIA()" class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center flex-shrink-0 active:scale-90 transition-transform">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            </button>
        </div>
    </div>

    <div class="fixed bottom-6 right-6 flex flex-col gap-4 z-40">
        <button onclick="toggleChat()" class="bg-zinc-900 border border-red-600/50 text-white p-4 rounded-full shadow-2xl hover:scale-110 transition-transform">
            <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
        </button>
        <button onclick="toggleCart()" class="bg-red-600 text-white p-4 rounded-full shadow-2xl flex items-center gap-2 active:scale-95 transition-all">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
            <span id="cart-badge" class="bg-white text-red-600 font-black text-xs w-6 h-6 flex items-center justify-center rounded-full">0</span>
        </button>
    </div>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/80 z-50 opacity-0 pointer-events-none transition-opacity backdrop-blur-sm"></div>
    <div id="cart-modal" class="fixed top-0 right-0 w-full max-w-md h-full glass border-l border-white/10 z-50 transition-transform duration-300 translate-x-full flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-zinc-900">
            <h2 class="text-xl font-black uppercase text-white tracking-tighter">Mi Pedido</h2>
            <button onclick="toggleCart()" class="text-zinc-500">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-950 border-t border-red-600/20">
            <input type="text" id="nombreCliente" placeholder="Nombre / Empresa" class="form-input p-3.5 w-full text-xs mb-3 font-bold">
            <button onclick="enviarPedidoWA()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase text-[11px] text-white active:scale-95 transition-all">Enviar a WhatsApp</button>
        </div>
    </div>

    <script>
        let baseDatos = []; let carrito = []; let instaladorDiferido;

        // MOTOR DE INSTALACIÓN DIRECTA
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            instaladorDiferido = e;
            if (window.innerWidth < 768) {
                setTimeout(() => {
                    document.getElementById('pwa-install-banner').classList.remove('-translate-y-full');
                }, 3000);
            }
        });

        async function instalarAppDirecto() {
            if (!instaladorDiferido) return;
            instaladorDiferido.prompt();
            const { outcome } = await instaladorDiferido.userChoice;
            if (outcome === 'accepted') document.getElementById('pwa-install-banner').classList.add('-translate-y-full');
            instaladorDiferido = null;
        }

        // REGISTRO DE MOTOR (SW)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => reg.update());
            });
        }

        async function init() {
            try {
                const res = await fetch('llantas_maxell_camion.json');
                baseDatos = await res.json();
                render(baseDatos);
                AOS.init();
            } catch (e) { console.log("Error de carga"); }
        }

        function render(items) {
            const grid = document.getElementById('grid-camion');
            grid.innerHTML = items.map((l, i) => `
                <div class="glass p-8 rounded-[2.5rem] product-card flex flex-col border border-white/5 relative" data-aos="fade-up">
                    <p class="text-4xl font-black text-white mt-8 uppercase italic leading-none tracking-tighter">${l.medida}</p>
                    <h3 class="text-red-600 text-[10px] font-black uppercase tracking-[0.2em] mb-4">${l.modelo}</h3>
                    <p class="text-zinc-500 text-[10px] mb-6 flex-grow uppercase pt-4 border-t border-white/5 leading-relaxed font-medium">${l.desc}</p>
                    <div class="flex justify-between items-end">
                        <p class="text-2xl font-black text-white">${l.precio} BS</p>
                        <button onclick="agregarAlCarrito('${l.medida}','${l.modelo}',${l.precio})" class="bg-red-600 text-white px-6 py-3 rounded-xl font-black uppercase text-[9px] active:scale-90 transition-transform tracking-widest">Agregar</button>
                    </div>
                </div>`).join('');
        }

        function agregarAlCarrito(med, mod, pre) {
            const exist = carrito.find(x => x.modelo === mod);
            if(exist) exist.cantidad++; else carrito.push({medida: med, modelo: mod, precio: pre, cantidad: 1});
            actualizarUI();
            alert("Añadido 🛒");
        }

        function actualizarUI() {
            document.getElementById('cart-badge').innerText = carrito.reduce((a, b) => a + b.cantidad, 0);
            document.getElementById('cart-items').innerHTML = carrito.map((x, i) => `
                <div class="bg-zinc-900 border border-white/5 p-4 rounded-2xl flex justify-between items-center text-[10px]">
                    <div><b>${x.modelo}</b><br>${x.cantidad} x ${x.precio} BS</div>
                    <button onclick="carrito.splice(${i},1);actualizarUI();" class="text-red-600 font-black uppercase">X</button>
                </div>`).join('');
        }

        async function enviarMensajeIA() {
            const input = document.getElementById('chatInput');
            const box = document.getElementById('chat-messages');
            if(!input.value.trim()) return;
            const userMsg = input.value;
            box.innerHTML += `<div class="bg-blue-600 text-white p-3 rounded-xl rounded-tr-none self-end max-w-[85%] shadow-md">${userMsg}</div>`;
            input.value = ''; box.scrollTop = box.scrollHeight;
            try {
                const res = await fetch('https://global-tyre-api.onrender.com/api/chat', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify({ message: userMsg }) 
                });
                const data = await res.json();
                box.innerHTML += `<div class="bg-zinc-800 text-white p-3 rounded-xl rounded-tl-none self-start max-w-[85%] border border-white/5">
                    <span class="text-red-500 font-black uppercase text-[8px] block mb-1">Asesor GlobalTyre</span>
                    ${data.response}
                </div>`;
            } catch(e) { box.innerHTML += `<div class="text-red-500 text-center">Error</div>`; }
            box.scrollTop = box.scrollHeight;
        }

        function ejecutarFiltros() {
            const med = document.getElementById('filtroMedida').value.toLowerCase();
            const pos = document.getElementById('filtroPosicion').value;
            const app = document.getElementById('filtroAplicacion').value;
            let res = baseDatos.filter(l => l.medida.toLowerCase().includes(med) || l.modelo.toLowerCase().includes(med));
            if(pos !== 'TODAS') res = res.filter(l => l.posicion === pos || l.categoria === pos);
            if(app !== 'TODAS') res = res.filter(l => l.aplicacion.includes(app));
            render(res);
        }

        function toggleChat() { const c = document.getElementById('ai-chat-window'); c.classList.toggle('opacity-0'); c.classList.toggle('pointer-events-none'); c.classList.toggle('translate-y-4'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('translate-x-full'); document.getElementById('cart-overlay').classList.toggle('opacity-0'); document.getElementById('cart-overlay').classList.toggle('pointer-events-none'); }
        function enviarPedidoWA() {
            const clie = document.getElementById('nombreCliente').value.trim();
            if(!clie || carrito.length === 0) return alert("Completa tus datos");
            let det = ""; carrito.forEach(x => det += `• ${x.cantidad}x ${x.modelo}\n`);
            window.open(`https://wa.me/59176395001?text=${encodeURIComponent("*PEDIDO GLOBALTYRE*\n*Cliente:* "+clie+"\n\n"+det)}`);
        }

        window.onload = init;
    </script>
</body>
</html>
