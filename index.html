<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalTyre | Asesor Virtual & Catálogo B2B</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <link rel="apple-touch-icon" href="logo.jpg">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <style>
        :root { --brand-red: #dc2626; --brand-black: #09090b; }
        body { 
            background: var(--brand-black); color: #fafafa; 
            background-image: url('https://www.transparenttextures.com/patterns/asphalt.png');
            background-attachment: fixed; font-family: 'Inter', sans-serif; overflow-x: hidden;
        }
        .glass { background: rgba(15, 15, 18, 0.98); backdrop-filter: blur(12px); border: 1px solid rgba(220, 38, 38, 0.2); }
        .hero-bg { background: linear-gradient(180deg, rgba(220,38,38,0.25) 0%, rgba(9,9,11,1) 100%); }
        .product-card { transition: all 0.4s ease; border-top: 3px solid transparent; }
        .product-card:hover { transform: translateY(-8px); border-top-color: var(--brand-red); box-shadow: 0 15px 30px rgba(220, 38, 38, 0.1); }
        .form-input { background: #18181b; border: 1px solid #27272a; border-radius: 0.75rem; color: white; font-weight: 700; transition: 0.3s; }
        .form-input:focus { border-color: var(--brand-red); outline: none; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--brand-black); z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; animation: forceHide 3s forwards; }
        @keyframes forceHide { 0%, 80% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        .logo-pulse { width: 85px; height: 85px; border-radius: 50%; background: white; animation: heartbeat 1.2s infinite ease-in-out; }
        @keyframes heartbeat { 0%, 100% { transform: scale(0.9); } 50% { transform: scale(1.1); box-shadow: 0 0 35px rgba(220, 38, 38, 1); } }
    </style>
</head>
<body class="antialiased">

    <div id="pwa-install-banner" class="fixed top-0 left-0 w-full z-[100] transition-transform duration-500 -translate-y-full">
        <div class="bg-zinc-900 border-b border-red-600/50 p-3 shadow-2xl flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo.jpg" class="w-10 h-10 rounded-lg object-contain bg-white p-1" alt="App">
                <div>
                    <h4 class="text-white font-black text-[10px] uppercase tracking-tighter">GlobalTyre App</h4>
                    <p class="text-zinc-500 text-[8px] uppercase font-bold tracking-widest">Instalar para acceso rápido</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="hideInstallBanner()" class="text-zinc-500 text-[10px] font-bold px-2 uppercase">Luego</button>
                <button onclick="showInstructions(window.innerWidth < 768 ? 'android' : 'ios')" class="bg-red-600 text-white text-[9px] font-black px-4 py-2 rounded-full uppercase tracking-widest active:scale-95 transition-all">Instalar</button>
            </div>
        </div>
    </div>

    <div id="loader"><img src="logo.jpg" class="logo-pulse shadow-xl" alt="GlobalTyre"></div>

    <nav class="fixed w-full z-40 glass border-b border-white/5 top-0">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <img src="logo.jpg" alt="GlobalTyre" class="h-10 w-auto bg-white rounded p-1">
            <a href="https://wa.me/59176395001" class="bg-zinc-900 border border-white/10 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition-all">Soporte Bolivia</a>
        </div>
    </nav>

    <section class="relative pt-32 pb-16 flex flex-col items-center justify-center hero-bg text-center">
        <div class="z-10 px-6 max-w-4xl" data-aos="fade-up">
            <span class="bg-red-600/20 text-red-500 px-4 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest border border-red-600/30 mb-6 inline-block">División Camión & Agro</span>
            <h1 class="text-5xl md:text-8xl font-black uppercase mb-4 leading-none text-white tracking-tight">SOLUCIONES <br><span class="text-red-600 italic">QUE RUEDAN</span></h1>
        </div>
    </section>

    <div class="max-w-5xl mx-auto px-6 relative z-30 -mt-10 mb-20">
        <div class="glass p-6 md:p-8 rounded-[2.5rem] shadow-2xl text-center">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <input type="text" id="filtroMedida" onkeyup="ejecutarFiltros()" placeholder="Medida o Modelo..." class="form-input p-4 w-full text-xs">
                <select id="filtroPosicion" onchange="ejecutarFiltros()" class="form-input p-4 w-full text-xs">
                    <option value="TODAS">Eje (Todos)</option>
                    <option value="DIRECCIÓN">Dirección</option>
                    <option value="TRACCIÓN">Tracción</option>
                    <option value="REMOLQUE">Remolque</option>
                </select>
                <select id="filtroAplicacion" onchange="ejecutarFiltros()" class="form-input p-4 w-full text-xs">
                    <option value="TODAS">Aplicación (Todas)</option>
                    <option value="REGIONAL">Regional</option>
                    <option value="MIXTO">Mixto / Off-Road</option>
                </select>
            </div>
        </div>
    </div>

    <main id="grid-camion" class="max-w-6xl mx-auto px-6 pb-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></main>

    <section class="max-w-4xl mx-auto px-6 py-20 text-center border-t border-white/5" data-aos="fade-up">
        <h2 class="text-2xl font-black uppercase tracking-widest mb-4">Lleva nuestra App en tu bolsillo</h2>
        <p class="text-zinc-500 text-[10px] uppercase font-bold tracking-widest mb-10 text-center">Acceso directo a stock y precios actualizados</p>
        
        <div class="flex flex-wrap justify-center gap-6">
            <button onclick="showInstructions('android')" class="bg-zinc-900 border border-white/10 px-8 py-4 rounded-2xl flex items-center gap-4 hover:border-green-600 transition-all shadow-2xl">
                <svg class="w-8 h-8 text-green-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.523 15.3414C17.0609 15.3414 16.6908 14.9713 16.6908 14.5092C16.6908 14.0471 17.0609 13.677 17.523 13.677C17.9851 13.677 18.3552 14.0471 18.3552 14.5092C18.3552 14.9713 17.9851 15.3414 17.523 15.3414ZM6.47702 15.3414C6.01492 15.3414 5.64478 14.9713 5.64478 14.5092C5.64478 14.0471 6.01492 13.677 6.47702 13.677C6.93911 13.677 7.30925 14.0471 7.30925 14.5092C7.30925 14.9713 6.93911 15.3414 6.47702 15.3414ZM17.8824 10.3957L19.8659 6.96323C19.9882 6.7516 19.9157 6.48037 19.7039 6.35824C19.4922 6.23611 19.2211 6.30843 19.0988 6.52026L17.0911 9.99619C15.6033 9.31495 13.9168 8.93884 12.129 8.93884C10.3412 8.93884 8.65471 9.31495 7.16694 9.99619L5.15918 6.52026C5.03692 6.30843 4.76579 6.23611 4.55403 6.35824C4.34227 6.48037 4.26978 6.7516 4.39211 6.96323L6.37563 10.3957C2.70997 12.3853 0.170668 16.1472 0 20.5485H24.2581C24.0874 16.1472 21.5481 12.3853 17.8824 10.3957Z"/></svg>
                <div class="text-left"><p class="text-zinc-500 text-[9px] font-bold uppercase">Descarga para</p><p class="text-white font-black text-sm uppercase">Android</p></div>
            </button>
            <button onclick="showInstructions('ios')" class="bg-zinc-900 border border-white/10 px-8 py-4 rounded-2xl flex items-center gap-4 hover:border-white transition-all shadow-2xl">
                <svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.1 2.48-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .76-3.27.82-1.31.05-2.31-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91 1.15.05 2.13.44 2.87 1.21-1.56.93-1.28 3.38.36 4.06-1.09 1.67-2.45 3.39-3.44 4.39zM13 3.5c.73-.89 1.22-2.11 1.09-3.33-1.04.04-2.3.69-3.05 1.56-.67.77-1.26 2.03-1.1 3.21 1.16.09 2.33-.55 3.06-1.44z"/></svg>
                <div class="text-left"><p class="text-zinc-500 text-[9px] font-bold uppercase">Descarga para</p><p class="text-white font-black text-sm uppercase">iPhone / iOS</p></div>
            </button>
        </div>
    </section>

    <button onclick="toggleChat()" class="fixed bottom-24 right-6 bg-zinc-900 border border-red-600/50 text-white p-4 rounded-full shadow-2xl z-40 hover:scale-110 transition-transform">
        <svg class="w-6 h-6 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
    </button>

    <div id="ai-chat-window" class="fixed bottom-40 right-6 w-80 sm:w-96 glass rounded-2xl shadow-2xl z-50 flex flex-col overflow-hidden opacity-0 pointer-events-none transition-all translate-y-4">
        <div class="bg-gradient-to-r from-red-700 to-red-900 p-4 text-white flex justify-between items-center">
            <h3 class="font-black uppercase text-[10px] tracking-widest">Asesor Virtual GlobalTyre</h3>
            <button onclick="toggleChat()"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <div id="chat-messages" class="h-80 bg-zinc-950/90 p-4 overflow-y-auto flex flex-col gap-3">
            <div class="bg-zinc-800 text-white text-xs p-3 rounded-xl rounded-tl-none border border-zinc-700 max-w-[85%]">Bienvenido. Soy el Asesor de GlobalTyre. ¿Qué medida estás buscando?</div>
        </div>
        <div class="bg-zinc-900 p-3 border-t border-white/10 flex gap-2">
            <input type="text" id="chatInput" placeholder="Preguntar..." class="bg-black border border-zinc-700 text-white text-xs rounded-xl px-4 py-2 w-full outline-none focus:border-red-600">
            <button onclick="enviarMensajeIA()" class="bg-red-600 text-white p-2 rounded-xl active:scale-90 transition-transform">-></button>
        </div>
    </div>

    <button onclick="toggleCart()" class="fixed bottom-6 right-6 bg-red-600 text-white p-4 rounded-full shadow-2xl z-40 flex items-center gap-2 active:scale-95 transition-all">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
        <span id="cart-badge" class="bg-white text-red-600 font-black text-xs w-6 h-6 flex items-center justify-center rounded-full">0</span>
    </button>

    <div id="cart-overlay" onclick="toggleCart()" class="fixed inset-0 bg-black/80 z-50 opacity-0 pointer-events-none transition-opacity"></div>
    <div id="cart-modal" class="fixed top-0 right-0 w-full max-w-md h-full glass border-l border-white/10 z-50 transition-transform duration-300 translate-x-full flex flex-col">
        <div class="p-6 border-b border-white/5 flex justify-between items-center bg-zinc-900">
            <h2 class="text-xl font-black uppercase text-white">Mi Carrito</h2>
            <button onclick="toggleCart()" class="text-zinc-500"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
        <div class="p-6 bg-zinc-950 border-t border-red-600/20">
            <input type="text" id="nombreCliente" placeholder="Nombre o Empresa" class="form-input p-3 w-full text-xs mb-3">
            <button onclick="enviarPedidoWA()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase text-[11px] text-white">Enviar pedido por WhatsApp</button>
        </div>
    </div>

    <div id="modal-instrucciones" class="fixed inset-0 z-[110] bg-black/95 hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="glass max-w-sm w-full rounded-[2.5rem] p-8 text-center border-white/10 shadow-3xl">
            <h3 id="instruccion-titulo" class="text-white font-black uppercase tracking-widest mb-4"></h3>
            <div id="instruccion-pasos" class="text-zinc-400 text-xs space-y-4 mb-8 text-left bg-zinc-900/50 p-6 rounded-2xl border border-white/5"></div>
            <button onclick="cerrarModal()" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-[10px] tracking-widest shadow-xl">Entendido</button>
        </div>
    </div>

    <script>
        let baseDatos = []; let carrito = [];

        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').then(reg => console.log('SW OK')).catch(err => console.log('SW Error', err));
            });
        }

        async function init() {
            try {
                const res = await fetch('llantas_maxell_camion.json');
                baseDatos = await res.json();
                render(baseDatos);
                AOS.init();
                if (window.innerWidth < 768) setTimeout(() => document.getElementById('pwa-install-banner').classList.remove('-translate-y-full'), 4000);
            } catch (e) { console.log("Error de carga"); }
        }

        function render(items) {
            const grid = document.getElementById('grid-camion');
            grid.innerHTML = items.map((l, i) => `
                <div class="glass p-8 rounded-[2.5rem] product-card flex flex-col h-full border border-white/5 relative" data-aos="fade-up">
                    <p class="text-4xl font-black text-white mt-8 uppercase italic leading-none">${l.medida}</p>
                    <h3 class="text-red-600 text-[10px] font-black uppercase tracking-[0.2em] mb-4">${l.modelo}</h3>
                    <p class="text-zinc-500 text-[10px] mb-6 flex-grow uppercase pt-4 border-t border-white/5 leading-relaxed">${l.desc}</p>
                    <p class="text-2xl font-black text-white mb-4">${l.precio} BS</p>
                    <button onclick="agregarAlCarrito('${l.medida}','${l.modelo}',${l.precio})" class="w-full bg-red-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">Añadir al Carrito</button>
                </div>`).join('');
        }

        function agregarAlCarrito(med, mod, pre) {
            const exist = carrito.find(x => x.modelo === mod);
            if(exist) exist.cantidad++; else carrito.push({medida: med, modelo: mod, precio: pre, cantidad: 1});
            actualizarUI();
            alert("Añadido 🛒");
        }

        function actualizarUI() {
            document.getElementById('cart-badge').innerText = carrito.reduce((a, b) => a + b.cantidad, 0);
            document.getElementById('cart-items').innerHTML = carrito.map((x, i) => `
                <div class="bg-zinc-900 border border-white/5 p-4 rounded-xl flex justify-between items-center text-xs">
                    <div><b>${x.modelo}</b><br>${x.cantidad} x ${x.precio} BS</div>
                    <button onclick="carrito.splice(${i},1);actualizarUI();" class="text-red-500 font-bold uppercase">X</button>
                </div>`).join('');
        }

        function enviarPedidoWA() {
            const clie = document.getElementById('nombreCliente').value.trim();
            if(!clie || carrito.length === 0) return alert("Completa tus datos");
            let det = ""; carrito.forEach(x => det += `• ${x.cantidad}x ${x.modelo}\n`);
            const msg = `*PEDIDO GLOBALTYRE*\n👤 *Cliente:* ${clie}\n\n🛒 *DETALLE:*\n${det}`;
            window.open(`https://wa.me/59176395001?text=${encodeURIComponent(msg)}`);
        }

        async function enviarMensajeIA() {
            const input = document.getElementById('chatInput'); const msg = input.value.trim();
            if(!msg) return;
            const chatBox = document.getElementById('chat-messages');
            chatBox.innerHTML += `<div class="bg-red-600 text-white text-xs p-3 rounded-xl self-end max-w-[85%]">${msg}</div>`;
            input.value = ''; chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const res = await fetch('https://global-tyre-api.onrender.com/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
                const data = await res.json();
                chatBox.innerHTML += `<div class="bg-zinc-800 text-white text-xs p-3 rounded-xl border border-zinc-700 max-w-[85%]">${data.response}</div>`;
            } catch(e) { chatBox.innerHTML += `<div class="text-red-500 text-center text-[10px]">Error de conexión</div>`; }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function ejecutarFiltros() {
            const med = document.getElementById('filtroMedida').value.toLowerCase();
            const pos = document.getElementById('filtroPosicion').value;
            const app = document.getElementById('filtroAplicacion').value;
            let res = baseDatos.filter(l => l.medida.toLowerCase().includes(med) || l.modelo.toLowerCase().includes(med));
            if(pos !== 'TODAS') res = res.filter(l => l.posicion === pos || l.categoria === pos);
            if(app !== 'TODAS') res = res.filter(l => l.aplicacion.includes(app));
            render(res);
        }

        function toggleChat() { const c = document.getElementById('ai-chat-window'); c.classList.toggle('opacity-0'); c.classList.toggle('pointer-events-none'); c.classList.toggle('translate-y-4'); }
        function toggleCart() { document.getElementById('cart-modal').classList.toggle('translate-x-full'); document.getElementById('cart-overlay').classList.toggle('opacity-0'); document.getElementById('cart-overlay').classList.toggle('pointer-events-none'); }
        function hideInstallBanner() { document.getElementById('pwa-install-banner').classList.add('-translate-y-full'); }
        function cerrarModal() { document.getElementById('modal-instrucciones').classList.add('hidden'); }
        
        function showInstructions(so) {
            const modal = document.getElementById('modal-instrucciones');
            modal.classList.remove('hidden');
            if (so === 'android') {
                document.getElementById('instruccion-titulo').innerText = "Instalar en Android";
                document.getElementById('instruccion-pasos').innerHTML = "<p>1. Toca los <b>3 puntos</b> arriba a la derecha.</p><p>2. Elige <b>'Instalar aplicación'</b> o 'Agregar a inicio'.</p>";
            } else {
                document.getElementById('instruccion-titulo').innerText = "Instalar en iPhone";
                document.getElementById('instruccion-pasos').innerHTML = "<p>1. Abre en <b>Safari</b>.</p><p>2. Toca <b>Compartir</b> (cuadrado con flecha).</p><p>3. Elige <b>'Agregar al inicio'</b>.</p>";
            }
        }

        window.onload = init;
    </script>
</body>
</html>
